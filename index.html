<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Scanner</title>
    <script src="js/jsQR.min.js"></script>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#3498db" />
    <!-- Tailwind CSS CDN -->
    <link href="public/style.css" rel="stylesheet" />
  </head>
  <body class="font-sans max-w-2xl mx-auto p-5 bg-white">
    <h1 class="text-2xl font-bold mb-4 text-center">Code Scanner</h1>

    <div
      class="relative w-full max-w-md mx-auto border-2 border-blue-500 rounded-lg overflow-hidden mb-6"
    >
      <video id="scanner" playsinline muted class="w-full block"></video>
      <img id="frozenImage" alt="Frozen QR code frame" class="hidden w-full" />
      <div
        id="previewNotice"
        class="absolute top-2 left-0 right-0 bg-black/70 text-white py-1 text-center text-sm"
        style="display: none"
      >
        Code detected
      </div>
    </div>

    <div class="mb-4">
      <button
        id="startBtn"
        class="bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded mr-2"
      >
        Start Scanner
      </button>
      <button
        id="stopBtn"
        class="bg-blue-500 hover:bg-blue-700 text-white px-4 py-2 rounded mr-2"
        disabled
      >
        Stop Scanner
      </button>
    </div>

    <div
      id="result"
      class="p-4 border border-gray-300 rounded mb-3 min-h-[20px] bg-gray-50"
    >
      No QR code detected yet.
    </div>
    <button
      id="copyBtn"
      class="bg-green-500 hover:bg-green-700 text-white px-4 py-2 rounded mr-2"
      disabled
    >
      Copy to Clipboard
    </button>
    <span id="copyStatus"></span>
    <button
      id="openUrlBtn"
      class="bg-indigo-500 hover:bg-indigo-700 text-white px-4 py-2 rounded mr-2"
      style="display: none"
    >
      Open URL
    </button>

    <div class="history mt-8 border-t border-gray-200 pt-6">
      <h2 class="text-lg font-semibold mb-2">Scan History</h2>
      <button
        id="clearHistory"
        class="bg-red-500 hover:bg-red-700 text-white px-3 py-1 rounded mb-3"
      >
        Clear History
      </button>
      <div id="historyList"></div>
    </div>

    <script>
      // DOM elements
      const video = document.getElementById("scanner");
      const frozenImage = document.getElementById("frozenImage");
      const startBtn = document.getElementById("startBtn");
      const stopBtn = document.getElementById("stopBtn");
      const copyBtn = document.getElementById("copyBtn");
      const resultDiv = document.getElementById("result");
      const copyStatus = document.getElementById("copyStatus");
      const historyList = document.getElementById("historyList");
      const clearHistoryBtn = document.getElementById("clearHistory");
      const previewNotice = document.getElementById("previewNotice");
      const openUrlBtn = document.getElementById("openUrlBtn");

      // State variables
      let stream = null;
      let scanning = false;
      let scannedData = null;
      const MAX_HISTORY = 50; // Maximum number of history items to store

      // Initialize
      loadHistory();

      // Start scanner
      startBtn.addEventListener("click", async () => {
        if (stream) {
          // Show video, hide frozen image
          video.style.display = "block";
          frozenImage.style.display = "none";

          scanning = true;
          startBtn.disabled = true;
          previewNotice.style.display = "none";

          // Restart scanning loop
          scanQRCode();
          return;
        }

        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
          });
          video.srcObject = stream;
          await video.play();

          // Show video, hide frozen image
          video.style.display = "block";
          frozenImage.style.display = "none";

          startBtn.disabled = true;
          stopBtn.disabled = false;
          scanning = true;

          scanQRCode();
        } catch (err) {
          console.error("Error accessing camera:", err);
          resultDiv.textContent = "Error accessing camera: " + err.message;
        }
      });

      // Stop scanner
      stopBtn.addEventListener("click", () => {
        if (stream) {
          stream.getTracks().forEach((track) => track.stop());
          video.srcObject = null;
          stream = null;
        }

        startBtn.disabled = false;
        stopBtn.disabled = true;
        scanning = false;
        previewNotice.style.display = "none";

        // Show video, hide frozen image
        video.style.display = "block";
        frozenImage.style.display = "none";
      });

      // Copy to clipboard
      copyBtn.addEventListener("click", () => {
        if (scannedData) {
          navigator.clipboard
            .writeText(scannedData)
            .then(() => {
              copyStatus.textContent = " ✓ Copied!";
              setTimeout(() => {
                copyStatus.textContent = "";
              }, 2000);
            })
            .catch((err) => {
              copyStatus.textContent = "Failed to copy: " + err;
            });
        }
      });

      // Clear history
      clearHistoryBtn.addEventListener("click", () => {
        localStorage.removeItem("qrScanHistory");
        historyList.innerHTML = "";
      });

      // Helper to check if string is a valid URL
      function isValidUrl(str) {
        try {
          const url = new URL(str);
          return url.protocol === "http:" || url.protocol === "https:";
        } catch (_) {
          return false;
        }
      }

      // QR code scanning function
      function scanQRCode() {
        if (!scanning) return;

        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);

        const imageData = context.getImageData(
          0,
          0,
          canvas.width,
          canvas.height
        );
        const code = jsQR(imageData.data, imageData.width, imageData.height);

        if (code) {
          scannedData = code.data;
          resultDiv.textContent = scannedData;
          copyBtn.disabled = false;

          // Show Open URL button if valid
          if (isValidUrl(scannedData)) {
            openUrlBtn.style.display = "inline-block";
            openUrlBtn.onclick = () => window.open(scannedData, "_blank");
          } else {
            openUrlBtn.style.display = "none";
            openUrlBtn.onclick = null;
          }

          // Add to history
          addToHistory(scannedData);

          // Freeze the frame
          freezeFrame(canvas);

          // Stop scanning
          scanning = false;
          startBtn.disabled = false;
          previewNotice.style.display = "block";

          return; // Exit the scanning loop
        } else {
          resultDiv.textContent = "No QR code detected.";
          copyBtn.disabled = true;
          openUrlBtn.style.display = "none";
          openUrlBtn.onclick = null;
        }

        requestAnimationFrame(scanQRCode);
      }

      // Freeze the current video frame
      function freezeFrame(canvas) {
        // Convert canvas to image URL and set as frozen image source
        frozenImage.src = canvas.toDataURL("image/png");

        // Hide video, show frozen image
        video.style.display = "none";
        frozenImage.style.display = "block";
      }

      // History functions
      function addToHistory(data) {
        // Get current history
        let history = JSON.parse(localStorage.getItem("qrScanHistory")) || [];

        // Add new item with timestamp
        history.unshift({
          data: data,
          timestamp: new Date().toISOString(),
        });

        // Limit history size
        if (history.length > MAX_HISTORY) {
          history = history.slice(0, MAX_HISTORY);
        }

        // Save to localStorage
        localStorage.setItem("qrScanHistory", JSON.stringify(history));

        // Update display
        loadHistory();
      }

      function loadHistory() {
        const history = JSON.parse(localStorage.getItem("qrScanHistory")) || [];
        historyList.innerHTML = "";

        if (history.length === 0) {
          historyList.innerHTML =
            "<p class='text-gray-500'>No scan history yet.</p>";
          return;
        }

        history.forEach((item) => {
          const div = document.createElement("div");
          div.className =
            "history-item p-2 border-b border-gray-100 break-all cursor-pointer hover:bg-gray-50";

          const date = new Date(item.timestamp);
          const timeString = date.toLocaleString();

          div.innerHTML = `
            <div class="timestamp text-gray-500 text-xs">${timeString}</div>
            <div>${item.data}</div>
          `;

          // Click to copy
          div.addEventListener("click", () => {
            navigator.clipboard.writeText(item.data).then(() => {
              const status = document.createElement("span");
              status.textContent = " ✓ Copied!";
              status.className = "ml-2 text-green-600";
              div.appendChild(status);
              setTimeout(() => {
                div.removeChild(status);
              }, 2000);
            });
          });

          historyList.appendChild(div);
        });
      }

      // Register service worker for offline access
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .register("js/service-worker.js")
            .then((reg) => {
              console.log("Service worker registered.", reg);
            })
            .catch((err) => {
              console.warn("Service worker registration failed:", err);
            });
        });
      }
    </script>
  </body>
</html>
